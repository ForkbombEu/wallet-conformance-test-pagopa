[wallet]
wallet_id = wallet_cli_instance
wallet_name = CEN TC Wallet CLI
wallet_version = V1_3
port = 3002
wallet_attestations_storage_path = ./data/attestation
credentials_storage_path = ./data/credentials
backup_storage_path = ./data/backup

[issuer]
port = 3003

[trust]
ca_cert_path = ./data/trust_anchor/localhost
certificate_subject = CN=localhost, O=myOrg, OU=myUnit, C=IT, ST=Roma, L=Roma, E=example@email.it
federation_trust_anchors[] =
federation_trust_anchors_jwks_path = ./data/trust_anchor/localhost

[issuance]
url = https://issuer.example
save_credential = false
credential_types[] = dc_sd_jwt_EuropeanDisabilityCard

[presentation]
authorize_request_url = https://rp-example.example/auth?client_id=https://rp-example.example&request_uri=https://rp-example.example/auth/request/example&state=example

[network]
timeout = 10
max_retries = 2
user_agent = CEN-TC-Wallet-CLI/default

[trust_anchor]
port = 3001
tls_cert_dir = ./data/backup

[logging]
log_level = INFO
log_file = ./data/logs/test_run.log
log_format = [%(tag)]: %(message)

[testing]
spec_pattern = **/*.spec.ts
custom_step_pattern = **/*.ts

[steps_mapping]
